name: Cross-platform compatibility

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

# Locked-down GITHUB_TOKEN. Job steps only need to clone + run npm/test; no
# write access required. Closes the CodeQL actions/missing-workflow-permissions
# advisory.
permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run typecheck:tests

      - name: MCP schema snapshot
        run: npm run test:mcp-schema-snapshot

      - name: Build
        run: npm run build

      - name: Run test suite
        run: npm run test:ci
